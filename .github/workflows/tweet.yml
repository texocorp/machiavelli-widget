name: Update Machiavelli Feed

# 頻度調整はここ(cron)で行う。既定は3時間おき。
# UTC基準なので日本時間との時差(-9時間)に注意。
# 例: 毎正時に実行したい → "0 * * * *"
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # Actionsタブから手動実行も可能にする

permissions:
  contents: write

# 同時に複数のワークフローが走って push が競合しないよう、直列実行に制御する。
# (手動実行と定時実行が重なった場合、後発は前者の完了を待ってから実行される)
concurrency:
  group: update-machiavelli-feed
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- 無料・独立のローカルLLM(Ollama)のセットアップ ---
      # Anthropic API等の外部有料サービスを使わず、CI実行環境内で
      # 完結する軽量モデルにより、つぶやきの下書きを推敲する。
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:11434/ && break
            sleep 1
          done

      - name: Pull local model
        run: ollama pull qwen2.5:3b

      - name: Generate feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OLLAMA_HOST: "http://localhost:11434"
          OLLAMA_MODEL: "qwen2.5:3b"
        run: python generate_feed.py

      - name: Commit and push updated feed
        run: |
          git config user.name "machiavelli-bot"
          git config user.email "actions@users.noreply.github.com"

          # docs/feed.json に加え、logs/ 以下の状態ファイル
          # (重複ニュース履歴・箴言の使用履歴・使用回数)もまとめてコミット対象にする。
          # これらが永続化されないと、箴言の重複回避や偏り是正が
          # 実行のたびにリセットされてしまう。
          git add docs/feed.json
          if [ -d logs ]; then
            git add logs/
          fi

          if git diff --quiet --cached; then
            echo "変更なし。コミットをスキップします。"
            exit 0
          fi

          git commit -m "Update feed.json [skip ci]"

          # push が「remote に新しい変更がある」ために拒否された場合に備え、
          # 直前の最新状態を取り込んでから再試行する(最大3回)。
          for i in 1 2 3; do
            if git push; then
              echo "push 成功"
              exit 0
            fi
            echo "push 失敗。リモートの最新状態を取り込んで再試行します (試行 $i/3)"
            git pull --rebase origin main
            sleep 3
          done

          echo "3回試行しても push に失敗しました。"
          exit 1
