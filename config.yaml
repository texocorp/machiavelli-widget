# ==========================================================
# Machiavelli Geopolitics Bot - 設定ファイル
# ==========================================================

# --- 投稿頻度の調整 ---
# posting_interval_minutes: 何分おきにツイートを試みるか
# posts_per_day_cap:        1日あたりの最大投稿数(過剰投稿の防止)
# quiet_hours:              つぶやかない時間帯(現地時間, 24h表記)
schedule:
  posting_interval_minutes: 180      # 例: 180 = 3時間おき。頻度を上げたければ数値を下げる(最小30推奨)
  posts_per_day_cap: 6
  quiet_hours:
    start: "01:00"
    end: "06:00"
  timezone: "Asia/Tokyo"

# --- 動作モード ---
# dry_run: true の間は実際には投稿せず、logs/tweets.jsonl に出力するだけ。
#          Twitter/X API の認証情報を設定し、false にすると実際に投稿する。
mode:
  dry_run: true

# --- ニュース取得元 (RSS) ---
# 地政学的に重要度の高い一次情報・通信社ソースを中心に設定。
# 自由に追加・削除可能。
#
# 注記(2026年更新): Reuters・AP は一般向けRSS配信を既に終了しているため、
# 代わりに Google News の国際(World)トピックフィードと、BBC / Al Jazeera を
# 追加し、特定ソース(NHK)への偏りを解消した。
news_sources:
  - name: "Google News 国際(World)"
    url: "https://news.google.com/rss/headlines/section/topic/WORLD?hl=ja&gl=JP&ceid=JP:ja"
  - name: "BBC World"
    url: "http://feeds.bbci.co.uk/news/world/rss.xml"
  - name: "Al Jazeera"
    url: "https://www.aljazeera.com/xml/rss/all.xml"
  - name: "NHK国際"
    url: "https://www3.nhk.or.jp/rss/news/cat6.xml"
  - name: "防衛省ニュース"
    url: "https://www.mod.go.jp/rss/news.xml"
  - name: "外務省報道発表"
    url: "https://www.mofa.go.jp/rss/press.xml"

# --- 地政学的重要度スコアリングの重み ---
# geopolitical_scorer.py が使用するキーワード群。重要ニュースの選別基準。
#
# 設計方針(2026年改訂):
# ・「訪問」「会談」「声明」のような、スポーツ・芸能等の記事にも
#   偶然マッチしてしまう汎用的すぎる語は low 階層から削除した
#   (例:「メジャーリーグ球団がホワイトハウスを訪問」が「訪問」に
#   反応して選ばれてしまう事例があったため)。
# ・exclude に該当する語が含まれる記事は、他の一致に関わらず
#   無条件で除外する(スポーツ・芸能・エンタメ等のノイズ排除)。
# ・selection.minimum_score 未満のスコアの記事は選ばない
#   (弱い一致1つだけでは選出されないようにする)。
scoring_weights:
  high:      # 重み 4点: 軍事的実力・主権・勢力均衡に直結
    - "軍事"
    - "侵攻"
    - "領土"
    - "核"
    - "同盟"
    - "米軍"
    - "台湾有事"
    - "戦争"
    - "封鎖"
    - "抑止"
    - "military"
    - "invasion"
    - "sovereignty"
    - "nuclear"
    - "alliance"
  medium:    # 重み 2点: 勢力圏・経済安全保障・外交
    - "外交"
    - "制裁"
    - "関税"
    - "首脳会談"
    - "国連"
    - "safety"
    - "sanction"
    - "summit"
    - "safety"
  low:       # 重み 1点: 国際情勢がらみだが単独では弱いシグナル
    - "対立"
    - "緊張"
    - "危機"

# 以下の語が含まれる記事は、他の一致点数に関わらず候補から除外する。
# スポーツ・芸能・エンタメ・グルメ等、地政学分析の素材にふさわしくない記事のノイズ除去。
exclude_keywords:
  - "メジャーリーグ"
  - "MLB"
  - "プロ野球"
  - "野球"
  - "サッカー"
  - "Jリーグ"
  - "バスケットボール"
  - "NBA"
  - "オリンピック"
  - "全豪オープン"
  - "全米オープン"
  - "ワールドカップ"
  - "芸能"
  - "俳優"
  - "女優"
  - "アイドル"
  - "コンサート"
  - "ライブツアー"
  - "映画"
  - "ドラマ"
  - "アニメ"
  - "ゲーム実況"
  - "グルメ"
  - "レシピ"
  - "ファッション"
  - "占い"
  - "ホワイトハウスを訪問"    # スポーツ球団等の表敬訪問(外交行事ではない)を明示的に除外

# --- 選別の閾値 ---
selection:
  # このスコア未満の記事は、たとえ最上位でも選ばない。
  # (low階層のキーワード単独一致=1点では選出されない水準に設定)
  minimum_score: 3

# --- Twitter/X API 認証情報 (dry_run=false の場合のみ使用) ---
# ここには直接キーを書かず、環境変数から読み込む運用を強く推奨します。
twitter_api:
  api_key_env: "TWITTER_API_KEY"
  api_secret_env: "TWITTER_API_SECRET"
  access_token_env: "TWITTER_ACCESS_TOKEN"
  access_secret_env: "TWITTER_ACCESS_SECRET"

# --- ツイート文体の設定 ---
persona:
  tone: "cold_realist"   # マキャベリの冷徹な現実主義トーン固定
  max_chars: 280
  language: "ja"
  # 近現代のリベラルな規範(国際法の理想主義・主権平等の建前)を採用せず、
  # 力の実相・保護国/属国関係・恐怖と信義の道具性を軸に分析するモード。
  ignore_liberal_framing: true
